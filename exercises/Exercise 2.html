      function ProductDetails2 ( {productname, price, discountPrice}) {
          return (
            <>

                <>
                  <p>{productname}</p>
                  <del><p>Price: ${price}</p></del>
                  {discountPrice && (
                    <p>Discount Price: ${discountPrice}</p>

                <>
                  <p>{productname}</p>
                  <p>Price: ${price}</p>
                  {discountPrice && (
                    <p>Discount Price: ${discountPrice}</p>
                  )}
                  <button>Add to Cart</button>
                </>

      console.log(ProductDetails2);

      function ProductDetails3 ( {productname, price, discountPrice, imageSrc}) {
          return (
                <div>
                  <img src={imageSrc} alt="" width="150"/>  
                  <p>{productname}</p>

                  {discountPrice ? (
                    <>
                    <p><del>Price: ${price}</del></p>
                    </>
                  ) : (
                    <>
                    <p>Price: ${price}</p> 
                    </> 
                  )    
                  }
                  {discountPrice && (

                  <button>Add to Cart</button>
