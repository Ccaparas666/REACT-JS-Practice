<!DOCTYPE html>
<html>
  <head>
    <title>Lesson Exercise 4</title>
    <style>
      .on-button {
        background-color: rgb(25, 135, 84);
        color: white;
        padding: 12px 20px;
        border: none;
        border-radius: 10px;
        transition: 0.3s;
      } 

      .off-button {
        background-color: rgb(220, 53, 69);
        color: white;
        padding: 12px 20px;
        border: none;
        border-radius: 10px;
        transition: 0.3s;
      }
    </style>
  </head>
  <body>
    <div class="js-container"></div>

    
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>
    <script type="text/babel">

    
    
      // exercise 4a, 4b, 4c
    function ButtonDisplay ({isButtonOn, setIsButtonOn}) {


      function switchButton () {
        setIsButtonOn(!isButtonOn); 
      }
      return (
        <button
          className={isButtonOn ? 'on-button' : 'off-button'}
          onClick={switchButton}
        >{isButtonOn ? 'ON' : 'OFF'}</button>
      )
      
    }

    function App () {
      const [isButtonOn, setIsButtonOn] = React.useState(true);
      
      return (
        <>
          <ButtonDisplay 
          isButtonOn={isButtonOn}
          setIsButtonOn={setIsButtonOn}
          />
        </>
      )
    }


      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);

    </script>
  </body>
</html>
